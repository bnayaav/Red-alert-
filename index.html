
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צבע אדום - התרעות בזמן אמת</title>

<style>

body{
font-family:Arial;
background:#0b0f1a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#ff3b30;
}

#status{
text-align:center;
margin-bottom:20px;
color:#9aa3c7;
}

.alert{
background:#2b0b0b;
border:2px solid #ff3b30;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

.city{
font-size:22px;
font-weight:bold;
margin-bottom:5px;
}

.time{
font-size:14px;
color:#ccc;
}

.safe{
background:#0f2b13;
border:2px solid #39d353;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<h1>🚨 צבע אדום</h1>

<div id="status">מתחבר לשרת...</div>

<div id="alerts"></div>

<script>

const proxyUrl = "https://red.bnaya-av.workers.dev";

let lastId = null;

async function fetchAlerts(){

try{

const response = await fetch(proxyUrl + "?t=" + Date.now());

const data = await response.json();

document.getElementById("status").innerText = "מחובר לשרת";

if(!data.data || data.data.length === 0){

document.getElementById("alerts").innerHTML = `
<div class="safe">
אין התרעות כרגע
</div>
`;

return;
}

const id = JSON.stringify(data);

if(id === lastId){
return;
}

lastId = id;

let html = "";

data.data.forEach(city=>{

html += `
<div class="alert">
<div class="city">${city}</div>
<div class="time">התקבלה התרעה</div>
</div>
`;

});

document.getElementById("alerts").innerHTML = html;

playAlarm();

}catch(err){

document.getElementById("status").innerText = "שגיאת חיבור";

}

}

function playAlarm(){

const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

audio.play();

}

fetchAlerts();

setInterval(fetchAlerts,3000);

</script>

</body>
</html>
