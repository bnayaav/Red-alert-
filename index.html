<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>צבע אדום - לייב</title>
  <style>
    :root{
      --bg:#070b16;
      --card:#0f1424;
      --card2:#141a2d;
      --text:#eef2ff;
      --muted:#a7b0c8;
      --red:#ff3b30;
      --green:#39d353;
      --orange:#d28a1e;
      --line:rgba(255,255,255,.06);
      --shadow:0 12px 30px rgba(0,0,0,.30);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#05070e 0%, #09101f 100%);
      color:var(--text);
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:18px 14px 36px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:22px;
      font-weight:800;
    }
    .brand .logo{
      width:58px;height:58px;border-radius:50%;
      display:grid;place-items:center;
      background:radial-gradient(circle at 30% 30%, #ff7770, #cb1f19 65%, #871010 100%);
      box-shadow:0 0 0 6px rgba(255,59,48,.12);
      font-size:28px;
    }
    .brand .red{color:var(--red)}
    .conn{
      font-size:14px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:#666;
      display:inline-block;
    }
    .dot.ok{background:var(--green)}
    .dot.warn{background:var(--orange)}
    .dot.bad{background:var(--red)}
    .card{
      background:linear-gradient(180deg,var(--card) 0%, #0b1120 100%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }
    .hero{
      display:grid;
      grid-template-columns:1fr auto;
      gap:14px;
      align-items:center;
    }
    .hero .right{
      text-align:left;
      min-width:120px;
    }
