name: Import Oref History

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  import-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Run importer
        run: node scripts/import-oref-history.js
        env:
          IMPORT_URL: https://red.bnaya-av.workers.dev/import-history
          IMPORT_TOKEN: ${{ secrets.IMPORT_TOKEN }}
